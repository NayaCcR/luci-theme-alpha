name: Build universal luci-theme-alpha IPK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build architecture-independent IPK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libncurses5-dev libssl-dev python3 \
            python3-setuptools unzip wget zlib1g-dev

      - name: Download OpenWrt SDK (23.05.3)
        run: |
          wget https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          rm openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Copy package
        run: |
          mkdir -p openwrt-sdk/package/luci-theme-alpha
          # Copy parent folder contents to SDK package folder directly using rsync
          # excludes openwrt-sdk directory to prevent infinitely copying itself
          rsync -a --exclude=openwrt-sdk/ ./ openwrt-sdk/package/luci-theme-alpha/

      - name: Build package
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/luci-theme-alpha/compile V=s

      - name: Collect universal IPK
        run: |
          mkdir -p dist
          IPK="$(find openwrt-sdk/bin/packages -type f -name 'luci-theme-alpha*_all.ipk' -print -quit)"
          if [ -z "$IPK" ]; then
            echo "Expected an architecture-independent luci-theme-alpha *_all.ipk package"
            find openwrt-sdk/bin/packages -type f -name 'luci-theme-alpha*.ipk' -print
            exit 1
          fi
          cp "$IPK" dist/
          sha256sum dist/*.ipk > dist/SHA256SUMS
          PACKAGE_NAME="$(basename "$IPK")"
          echo "Universal package: $PACKAGE_NAME"

      - name: Upload universal IPK
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-alpha-universal-ipk
          path: dist/
          if-no-files-found: error
          compression-level: 0
